kind = "web"
previewPath = "/"
title = "Zoya AI"
version = "1.0.0"
id = "zoya-ai-artifact"

[[services]]
localPort = 8081
name = "web"
paths = ["/"]

[services.env]
PORT = "8081"
BASE_PATH = "/"

[services.development]
run = "PORT=8081 BASE_PATH=/ pnpm --filter @workspace/zoya-ai run dev"

[services.production]
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/zoya-ai", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/"
