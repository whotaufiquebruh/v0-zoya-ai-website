kind = "web"
previewPath = "/"
title = "Zoya AI"
version = "1.0.0"

[[services]]
localPort = 3000
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/zoya-ai run dev"

[services.production]
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/zoya-ai", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
